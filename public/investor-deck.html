<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SharedXP — Investor Deck</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0f;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background-image:
      radial-gradient(ellipse 70% 60% at 70% 40%, rgba(108,99,255,.1) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 20% 80%, rgba(56,217,192,.07) 0%, transparent 50%);
  }
  .card {
    background: #1a1a26;
    border: 1px solid #2a2a3e;
    border-radius: 16px;
    padding: 48px;
    width: 100%;
    max-width: 420px;
    text-align: center;
  }
  .logo {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #6c63ff, #38d9c0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .eyebrow {
    font-size: 12px;
    color: #9090aa;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 32px;
  }
  h1 {
    font-size: 20px;
    font-weight: 700;
    color: #e8e8f0;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }
  p {
    font-size: 14px;
    color: #9090aa;
    margin-bottom: 28px;
    line-height: 1.6;
  }
  .input-wrap {
    position: relative;
    margin-bottom: 16px;
  }
  input[type=password], input[type=text] {
    width: 100%;
    background: #12121a;
    border: 1px solid #2a2a3e;
    border-radius: 10px;
    padding: 14px 48px 14px 16px;
    font-size: 16px;
    color: #e8e8f0;
    outline: none;
    transition: border-color .2s;
    font-family: inherit;
  }
  input::placeholder { color: #3a3a54; }
  input:focus { border-color: #6c63ff; }
  .toggle-btn {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: #9090aa;
    font-size: 16px;
    padding: 0;
    line-height: 1;
  }
  .toggle-btn:hover { color: #e8e8f0; }
  button[type=submit] {
    width: 100%;
    background: linear-gradient(135deg, #6c63ff, #38d9c0);
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    font-family: inherit;
    transition: opacity .2s;
    position: relative;
  }
  button[type=submit]:hover { opacity: .9; }
  button[type=submit]:disabled { opacity: .5; cursor: not-allowed; }
  .error {
    margin-top: 14px;
    font-size: 13px;
    color: #ff6b6b;
    display: none;
  }
  .spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
  }
  @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }
  .lock-icon { font-size: 36px; margin-bottom: 20px; }
  .footer { margin-top: 28px; font-size: 11px; color: #3a3a54; }
</style>
</head>
<body>
<div class="card">
  <div class="lock-icon">🔐</div>
  <div class="logo">SharedXP</div>
  <div class="eyebrow">Investor Deck · Seed Round 2026</div>
  <h1>Confidential access</h1>
  <p>This document is password protected.<br>Enter the access password to continue.</p>
  <form id="form">
    <div class="input-wrap">
      <input type="password" id="pwd" placeholder="Enter password" autofocus autocomplete="current-password" />
      <button type="button" class="toggle-btn" id="toggleBtn" title="Show/hide">👁</button>
    </div>
    <button type="submit" id="btn">
      <span id="btnText">Access deck</span>
      <div class="spinner" id="spinner"></div>
    </button>
    <div class="error" id="err">Incorrect password. Please try again.</div>
  </form>
  <div class="footer">CONFIDENTIAL — Authorised recipients only</div>
</div>

document.getElementById('toggleBtn').addEventListener('click', () => {
  const input = document.getElementById('pwd');
  input.type = input.type === 'password' ? 'text' : 'password';
});

async function decrypt(password, payloadB64) {
  const raw      = Uint8Array.from(atob(payloadB64), c => c.charCodeAt(0));
  const salt     = raw.slice(0, 16);
  const iv       = raw.slice(16, 28);
  const body     = raw.slice(28); // ciphertext + 16-byte GCM tag appended at end

  const keyMaterial = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']
  );
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false, ['decrypt']
  );
  const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, body);
  return new TextDecoder().decode(plain);
}

function render(html) {
  document.open();
  document.write(html);
  document.close();
}

async function trySession() {
  const saved = sessionStorage.getItem('sxp_pwd');
  if (!saved) return;
  try { render(await decrypt(saved, PAYLOAD)); }
  catch (_) { sessionStorage.removeItem('sxp_pwd'); }
}

document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const pwd     = document.getElementById('pwd').value;
  const btn     = document.getElementById('btn');
  const btnText = document.getElementById('btnText');
  const spinner = document.getElementById('spinner');
  const err     = document.getElementById('err');

  err.style.display = 'none';
  btn.disabled = true;
  btnText.style.opacity = '0';
  spinner.style.display = 'block';

  try {
    const html = await decrypt(pwd, PAYLOAD);
    sessionStorage.setItem('sxp_pwd', pwd);
    render(html);
  } catch (_) {
    err.style.display = 'block';
    btn.disabled = false;
    btnText.style.opacity = '1';
    spinner.style.display = 'none';
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
});

trySession();
</script>
