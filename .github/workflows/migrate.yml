name: Run Database Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to run migrations from
        required: false
        default: main

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref bwdkelprrvhztpviiujo
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Push migrations
        run: |
          set +e
          OUTPUT=$(supabase db push --linked 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"

          if [ $EXIT_CODE -ne 0 ] && echo "$OUTPUT" | grep -q 'already exists'; then
            echo "Migration history is out of sync. Repairing..."
            for f in $(ls supabase/migrations/*.sql | sort); do
              version=$(basename "$f" | grep -oP '^\d+')
              supabase migration repair --status applied "$version"
            done
            echo "Repair complete. Re-running push for any genuinely new migrations..."
            supabase db push --linked
          elif [ $EXIT_CODE -ne 0 ]; then
            exit $EXIT_CODE
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
