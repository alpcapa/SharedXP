name: Run Database Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to run migrations from
        required: false
        default: main

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.branch }}

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref bwdkelprrvhztpviiujo
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Push migrations
        run: |
          set +e
          # The remote schema predates the migration history table, so pushes
          # can fail on migrations whose objects already exist. Repair only the
          # specific migration that failed with "already exists" and retry, so
          # genuinely new migrations are still applied rather than skipped.
          attempts=$(ls supabase/migrations/*.sql | wc -l)
          for i in $(seq 0 "$attempts"); do
            OUTPUT=$(supabase db push --linked 2>&1)
            EXIT_CODE=$?
            echo "$OUTPUT"
            if [ $EXIT_CODE -eq 0 ]; then
              exit 0
            fi
            FAILED=$(echo "$OUTPUT" | grep -oP 'Applying migration \K\d+' | tail -1)
            if [ -n "$FAILED" ] && echo "$OUTPUT" | grep -q 'already exists'; then
              echo "Migration $FAILED already exists in the remote schema. Marking as applied..."
              supabase migration repair --status applied "$FAILED" || exit 1
            else
              exit $EXIT_CODE
            fi
          done
          echo "Exceeded repair attempts without converging." >&2
          exit 1
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
