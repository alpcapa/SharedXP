name: Auto-confirm bookings (hourly)

on:
  schedule:
    - cron: "15 * * * *"   # :15 past every hour
  workflow_dispatch:         # allow manual trigger from GitHub Actions tab

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Invoke auto-confirm edge function
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            https://bwdkelprrvhztpviiujo.supabase.co/functions/v1/auto-confirm
