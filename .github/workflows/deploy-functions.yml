name: Deploy Edge Functions

on:
  push:
    branches: [main, claude/add-resend-mailing-nh960, claude/fix-forgot-password-flow-xFLKX]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy booking-notify
        run: supabase functions deploy booking-notify --project-ref bwdkelprrvhztpviiujo --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy send-email
        run: supabase functions deploy send-email --project-ref bwdkelprrvhztpviiujo --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy forgot-password
        run: supabase functions deploy forgot-password --project-ref bwdkelprrvhztpviiujo --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
