name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy booking-notify
        run: supabase functions deploy booking-notify --project-ref bwdkelprrvhztpviiujo --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy send-email
        run: supabase functions deploy send-email --project-ref bwdkelprrvhztpviiujo --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy forgot-password
        run: supabase functions deploy forgot-password --project-ref bwdkelprrvhztpviiujo --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy events-sync
        run: supabase functions deploy events-sync --project-ref bwdkelprrvhztpviiujo --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy contact-support
        run: supabase functions deploy contact-support --project-ref bwdkelprrvhztpviiujo --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy inbound-support
        run: supabase functions deploy inbound-support --project-ref bwdkelprrvhztpviiujo --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy gdpr-erasure
        run: supabase functions deploy gdpr-erasure --project-ref bwdkelprrvhztpviiujo --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy cm-payout-sweep
        run: supabase functions deploy cm-payout-sweep --project-ref bwdkelprrvhztpviiujo --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
