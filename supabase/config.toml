# Supabase local development configuration.
# See https://supabase.com/docs/guides/local-development for details.

[project]
project_id = "sharedxp"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
# The URL of the site that this Supabase project is serving. Used in
# confirmation emails and OAuth redirects.
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = ["https://project-gq4ge.vercel.app"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 8

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

# Route auth confirmation emails through the Resend-backed Edge Function.
# To use this hook in production:
#   1. Deploy the function: supabase functions deploy send-email
#   2. In the Supabase dashboard → Authentication → Hooks, enable
#      "Send Email" and set the URI to:
#      https://<project-ref>.supabase.co/functions/v1/send-email
#   3. Set RESEND_API_KEY and RESEND_FROM_EMAIL as Edge Function secrets:
#      supabase secrets set RESEND_API_KEY=re_... RESEND_FROM_EMAIL=noreply@sharedxp.com
[auth.hook.send_email]
enabled = true
uri = "http://host.docker.internal:54321/functions/v1/send-email"
secrets = "env(SEND_EMAIL_HOOK_SECRET)"

[analytics]
enabled = false
